<template>
    <section class="shell">
        <header class="hero">
            <p class="overline">SCOUTING 360</p>
            <h1>Comparaison prospects</h1>
            <p class="meta">Choisis deux prospects puis lance la comparaison.</p>
        </header>

        <!-- Option 1: Comparaison Dynamic Drag & Drop -->
        <div class="slds-m-bottom_large" style="background: rgba(10,16,32,0.6); padding: 1rem; border-radius: 8px; border: 1px solid var(--sc360-border);">
            <div class="slds-form-element slds-m-bottom_small">
                <lightning-input type="search" placeholder="Rechercher un prospect à glisser-déposer..." onchange={handleSearchToggle}></lightning-input>
            </div>
            
            <template if:true={searchResults}>
                <div style="display:flex; gap: 0.5rem; overflow-x:auto; padding-bottom: 0.5rem;">
                    <template for:each={searchResults} for:item="s">
                        <div key={s.Id} draggable="true" ondragstart={handleDragStart} data-id={s.Id} data-name={s.Name} 
                             style="cursor: grab; padding: 0.5rem 1rem; background: var(--sc360-primary); color: white; border-radius: 20px; white-space: nowrap; font-size: 0.85rem; font-weight:600;">
                            <lightning-icon icon-name="standard:user" size="xx-small" class="slds-m-right_xx-small"></lightning-icon> {s.Name}
                        </div>
                    </template>
                </div>
            </template>
            
            <div style="display:flex; gap: 1rem; margin-top: 1rem;">
                <div ondragover={allowDrop} ondrop={handleDropA} style="flex:1; border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 1.5rem; text-align:center; color: var(--sc360-text);">
                    <lightning-icon icon-name="utility:download" size="small" class="slds-m-bottom_small"></lightning-icon><br>
                    {prospectAName}
                </div>
                <div ondragover={allowDrop} ondrop={handleDropB} style="flex:1; border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 1.5rem; text-align:center; color: var(--sc360-text);">
                    <lightning-icon icon-name="utility:download" size="small" class="slds-m-bottom_small"></lightning-icon><br>
                    {prospectBName}
                </div>
            </div>
        </div>

        <div class="actions">
            <lightning-button
                variant="brand"
                label="Comparer"
                onclick={handleCompare}
                disabled={compareDisabled}
            ></lightning-button>
        </div>

        <template if:true={error}>
            <div class="state error">{error}</div>
        </template>

        <template if:true={loading}>
            <div class="state">Chargement…</div>
        </template>

        <template if:true={hasRows}>
            <div class="names">
                <template for:each={rows} for:item="p">
                    <button
                        key={p.id}
                        type="button"
                        class="name-link"
                        data-id={p.id}
                        aria-label={p.name}
                        onclick={navigateToProspect}
                    >
                        {p.name}
                    </button>
                </template>
            </div>

            <table class="grid">
                <thead>
                    <tr>
                        <th>Critère</th>
                        <th>Prospect A</th>
                        <th>Prospect B</th>
                        <th>Écart (A − B)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Poste</td>
                        <td>{prospectA.position}</td>
                        <td>{prospectB.position}</td>
                        <td>—</td>
                    </tr>
                    <tr>
                        <td>Statut</td>
                        <td>{prospectA.status}</td>
                        <td>{prospectB.status}</td>
                        <td>—</td>
                    </tr>
                    <tr>
                        <td>Club actuel</td>
                        <td>{prospectA.currentClub}</td>
                        <td>{prospectB.currentClub}</td>
                        <td>—</td>
                    </tr>
                    <template for:each={metricRows} for:item="row">
                        <tr key={row.label}>
                            <td>{row.label}</td>
                            <td>
                                <template if:true={row.hasAVal}>
                                    <lightning-formatted-number
                                        value={row.aVal}
                                        format-style="decimal"
                                        maximum-fraction-digits="2"
                                    ></lightning-formatted-number>
                                </template>
                                <template if:false={row.hasAVal}>
                                    <span class="muted">—</span>
                                </template>
                            </td>
                            <td>
                                <template if:true={row.hasBVal}>
                                    <lightning-formatted-number
                                        value={row.bVal}
                                        format-style="decimal"
                                        maximum-fraction-digits="2"
                                    ></lightning-formatted-number>
                                </template>
                                <template if:false={row.hasBVal}>
                                    <span class="muted">—</span>
                                </template>
                            </td>
                            <td>
                                <template if:true={row.showDelta}>
                                    <lightning-formatted-number
                                        value={row.delta}
                                        format-style="decimal"
                                        maximum-fraction-digits="2"
                                    ></lightning-formatted-number>
                                </template>
                                <template if:false={row.showDelta}>
                                    <span class="muted">—</span>
                                </template>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>

            <div class="text-grid">
                <article class="card">
                    <h2>Forces — {prospectA.name}</h2>
                    <p class="block">{prospectA.topStrengths}</p>
                </article>
                <article class="card">
                    <h2>Forces — {prospectB.name}</h2>
                    <p class="block">{prospectB.topStrengths}</p>
                </article>
                <article class="card">
                    <h2>Risques — {prospectA.name}</h2>
                    <p class="block">{prospectA.topRisks}</p>
                </article>
                <article class="card">
                    <h2>Risques — {prospectB.name}</h2>
                    <p class="block">{prospectB.topRisks}</p>
                </article>
            </div>

            <div class="text-grid single">
                <article class="card wide">
                    <h2>Résumé scouting — {prospectA.name}</h2>
                    <p class="block">{prospectA.scoutingSummary}</p>
                </article>
                <article class="card wide">
                    <h2>Résumé scouting — {prospectB.name}</h2>
                    <p class="block">{prospectB.scoutingSummary}</p>
                </article>
            </div>
        </template>
    </section>
</template>
